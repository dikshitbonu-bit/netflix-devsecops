# This is a compose file for netflix clone application. It defines the services for the frontend, backend, and database.
services:
  frontend:
    image:  ${DOCKER_USERNAME}/netflix-frontend:latest
    container_name: netflix-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
  backend:
    image:  ${DOCKER_USERNAME}/netflix-backend:latest
    container_name: netflix-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
       mongo:
         condition: service_healthy
    healthcheck:
      test:  ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
          
  mongo:
    image: mongo:7
    container_name: netflix-mongo
    restart: unless-stopped 
    volumes:
      - mongo-data:/data/db  
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
volumes:
  mongo-data:
